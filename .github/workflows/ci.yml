name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint • Typecheck • Test • Coverage • Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Coverage gate
        run: pnpm test:coverage:gate

      - name: Build
        run: pnpm build

      # Smoke-run the benchmarks so they keep compiling and executing. Absolute
      # timings are not gated — shared CI runners are too noisy for a stable
      # threshold; baselines are tracked by running `pnpm bench` locally.
      - name: Benchmarks
        run: pnpm bench
