<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <!-- Suppress the browser's own pinch / double-tap page zoom on touch
         devices: the editor owns zooming (pinch gesture → scene zoom). Without
         this, iOS Safari visually zooms the PAGE while pointer coordinates stay
         in layout space, so hit-testing lands "off to the side" of where
         elements appear after a pinch. `viewport-fit=cover` handles notches. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>@oh-just-another/demo</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body,
      #root {
        margin: 0;
        height: 100%;
      }
      /* No rubber-band / pull-to-refresh, and the page itself never
         scrolls or pans on touch — the canvas handles all gestures. */
      html,
      body {
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
      }

      /* Dark theme (default) */
      [data-theme="dark"] {
        --bg: #1a1a1a;
        --panel: #161616;
        --surface: #fff;
        --border: #2a2a2a;
        --divider: #333;
        --text: #ddd;
        --text-strong: #fff;
        --muted: #888;
        --faint: #555;
        --accent: #1a73e8;
        --accent-dim: #4f80ff;
        --accent-halo: rgba(26, 115, 232, 0.3);
        --cursor-bg: rgba(26, 115, 232, 0.12);
        --toolbar-bg: #1a1a1a;
        --button-bg: #2a2a2a;
      }

      /* Light theme */
      [data-theme="light"] {
        --bg: #fafafa;
        --panel: #fff;
        --surface: #fff;
        --border: #e2e2e2;
        --divider: #ddd;
        --text: #333;
        --text-strong: #000;
        --muted: #666;
        --faint: #999;
        --accent: #1a73e8;
        --accent-dim: #4f80ff;
        --accent-halo: rgba(26, 115, 232, 0.25);
        --cursor-bg: rgba(26, 115, 232, 0.08);
        --toolbar-bg: #fff;
        --button-bg: #f3f3f3;
      }

      body {
        background: var(--bg);
        color: var(--text);
      }

      /* Adaptive layout — phone width.
       * On ≤640px the side panels stack at the bottom as a horizontal
       * scroll strip ("bottom-sheet"-style). Header collapses to a
       * compact row; canvas takes the full remaining height.
       * Each panel column uses `data-panel-stack` to opt-in.
       */
      @media (max-width: 640px) {
        [data-panel-stack="main"] {
          flex-direction: column !important;
        }
        [data-panel-stack="main"] > [data-panel="palette"],
        [data-panel-stack="main"] > [data-panel="property"],
        [data-panel-stack="main"] > [data-panel="layers"],
        [data-panel-stack="main"] > [data-panel="history"] {
          width: 100% !important;
          max-height: 35vh;
          border-left: none !important;
          border-right: none !important;
          border-top: 1px solid var(--border);
          flex: 0 0 auto !important;
        }
        [data-panel-stack="main"] > [data-panel="canvas"] {
          flex: 1 1 auto !important;
          min-height: 40vh;
        }
        [data-panel="palette"] {
          display: flex;
          flex-direction: row;
          overflow-x: auto;
        }
        [data-mobile-only="hide"] {
          display: none !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
