<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>@oh-just-another/demo — Phase 3 sandbox</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
      }
      body {
        margin: 0;
        padding: 16px;
        background: #1a1a1a;
        color: #ddd;
      }
      h1 {
        font-size: 14px;
        font-weight: 500;
        margin: 0 0 12px;
        color: #888;
        letter-spacing: 0.5px;
      }
      .stage {
        width: 1000px;
        height: 600px;
        max-width: 100%;
        background: #fff;
        border: 1px solid #333;
        border-radius: 4px;
        overflow: hidden;
      }
      .hint {
        margin-top: 12px;
        font-size: 12px;
        color: #666;
      }
    </style>
  </head>
  <body>
    <h1>Phase 3 — renderer-canvas visual sandbox</h1>
    <div id="stage" class="stage"></div>
    <div class="hint">
      Open DevTools -> Console to see a report of which shapes were drawn and how long it took.
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
