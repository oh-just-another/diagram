name: Release

on:
  push:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      # Mint the OIDC token npm needs to attach build provenance on publish.
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Import a dedicated signing key so the version-bump commit changesets
      # makes is verifiable. The action sets git user.name / user.email from the
      # key's UID and turns on commit.gpgsign — so the commit is authored by the
      # key's identity (a verified email) and signed. `required_signatures` on
      # master then accepts the release PR, allowing a merge commit.
      #
      # The key is passphrase-less: CI has no TTY, so a passphrase-protected key
      # makes git's commit signing fall back to pinentry and fail ("Inappropriate
      # ioctl for device"). The private key is already a protected repo secret.
      - name: Import GPG signing key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.RELEASE_GPG_PRIVATE_KEY }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm version-packages
          commit: "chore: release packages"
          title: "chore: release packages"
          # Keep the identity set by the GPG import step (a verified address)
          # instead of changesets' default github-actions[bot] — otherwise the
          # committer email wouldn't match the signing key and the commit shows
          # as Unverified.
          setupGitUser: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # setup-node's registry-url writes an .npmrc that reads NODE_AUTH_TOKEN,
          # so the npm token must be exposed under that name for `changeset publish`.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Publish with signed build provenance (npm shows the verified-build
          # badge). Needs the id-token permission above; each package's
          # repository field must match this repo.
          NPM_CONFIG_PROVENANCE: "true"
