<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>@oh-just-another/demo</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body,
      #root {
        margin: 0;
        height: 100%;
      }

      /* Dark theme (default) */
      [data-theme="dark"] {
        --bg: #1a1a1a;
        --panel: #161616;
        --surface: #fff;
        --border: #2a2a2a;
        --divider: #333;
        --text: #ddd;
        --text-strong: #fff;
        --muted: #888;
        --faint: #555;
        --accent: #1a73e8;
        --accent-dim: #4f80ff;
        --accent-halo: rgba(26, 115, 232, 0.3);
        --cursor-bg: rgba(26, 115, 232, 0.12);
        --toolbar-bg: #1a1a1a;
        --button-bg: #2a2a2a;
      }

      /* Light theme */
      [data-theme="light"] {
        --bg: #fafafa;
        --panel: #fff;
        --surface: #fff;
        --border: #e2e2e2;
        --divider: #ddd;
        --text: #333;
        --text-strong: #000;
        --muted: #666;
        --faint: #999;
        --accent: #1a73e8;
        --accent-dim: #4f80ff;
        --accent-halo: rgba(26, 115, 232, 0.25);
        --cursor-bg: rgba(26, 115, 232, 0.08);
        --toolbar-bg: #fff;
        --button-bg: #f3f3f3;
      }

      body {
        background: var(--bg);
        color: var(--text);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
