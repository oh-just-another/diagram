name: Release

on:
  push:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      # Mint the OIDC token npm needs to attach build provenance on publish.
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm version-packages
          commit: "chore: release packages"
          title: "chore: release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # setup-node's registry-url writes an .npmrc that reads NODE_AUTH_TOKEN,
          # so the npm token must be exposed under that name for `changeset publish`.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Publish with signed build provenance (npm shows the verified-build
          # badge). Needs the id-token permission above; each package's
          # repository field must match this repo.
          NPM_CONFIG_PROVENANCE: "true"
