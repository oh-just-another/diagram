<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>@oh-just-another/demo</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        background: #1a1a1a;
        color: #ddd;
        display: flex;
        flex-direction: column;
      }
      header {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        padding: 12px 16px;
        border-bottom: 1px solid #2a2a2a;
      }
      header h1 {
        font-size: 13px;
        font-weight: 500;
        margin: 0;
        color: #888;
        letter-spacing: 0.5px;
      }
      .toolbar {
        display: flex;
        gap: 6px;
        align-items: center;
      }
      .toolbar button {
        background: #2a2a2a;
        color: #ddd;
        border: 1px solid #3a3a3a;
        border-radius: 4px;
        padding: 6px 12px;
        font: inherit;
        font-size: 13px;
        cursor: pointer;
        transition: border-color 0.1s;
      }
      .toolbar button:hover:not(:disabled) {
        border-color: #555;
      }
      .toolbar button.active {
        border-color: #1a73e8;
        color: #fff;
        background: #1a3d6e;
      }
      .toolbar button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .toolbar .separator {
        width: 1px;
        align-self: stretch;
        background: #333;
        margin: 0 4px;
      }
      .hint {
        font-size: 11px;
        color: #666;
        text-align: center;
        max-width: 720px;
      }
      .hint kbd {
        background: #2a2a2a;
        padding: 1px 5px;
        border-radius: 3px;
        border: 1px solid #3a3a3a;
        font-family: inherit;
        font-size: 11px;
      }

      main {
        flex: 1 1 auto;
        display: flex;
        min-height: 0;
      }

      /* Palette panel (left) */
      .palette {
        width: 200px;
        flex: 0 0 200px;
        background: #161616;
        border-right: 1px solid #2a2a2a;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      .palette h2 {
        margin: 0;
        padding: 10px 12px;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #777;
        border-bottom: 1px solid #2a2a2a;
      }
      .palette-tabs {
        display: flex;
        gap: 4px;
        padding: 6px 8px;
        border-bottom: 1px solid #2a2a2a;
        flex-wrap: wrap;
      }
      .palette-tabs button {
        background: transparent;
        color: #888;
        border: 1px solid #2a2a2a;
        border-radius: 3px;
        padding: 3px 8px;
        font: inherit;
        font-size: 11px;
        cursor: pointer;
      }
      .palette-tabs button.active {
        color: #fff;
        border-color: #1a73e8;
        background: #1a3d6e;
      }
      .palette-items {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 8px;
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 6px;
        align-content: start;
      }
      .palette-item {
        background: #1f1f1f;
        border: 1px solid #2f2f2f;
        border-radius: 4px;
        aspect-ratio: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        color: #bbb;
        cursor: grab;
        transition:
          border-color 0.1s,
          background 0.1s;
        padding: 6px 4px;
        text-align: center;
      }
      .palette-item:hover {
        border-color: #1a73e8;
        background: #233042;
        color: #fff;
      }
      .palette-item:active {
        cursor: grabbing;
      }
      .palette-item svg {
        width: 28px;
        height: 28px;
      }
      .palette-item .name {
        font-size: 10px;
        line-height: 1.1;
      }

      .stage {
        flex: 1 1 auto;
        background: #fff;
        overflow: hidden;
        touch-action: none;
        user-select: none;
        position: relative;
      }
      .stage.drop-target::after {
        content: "";
        position: absolute;
        inset: 4px;
        border: 2px dashed #1a73e8;
        border-radius: 4px;
        pointer-events: none;
      }

      /* History panel (right) */
      .history-panel {
        width: 240px;
        flex: 0 0 240px;
        background: #161616;
        border-left: 1px solid #2a2a2a;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      .history-panel h2 {
        margin: 0;
        padding: 10px 12px;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #777;
        border-bottom: 1px solid #2a2a2a;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .history-panel .history-counter {
        font-size: 10px;
        color: #555;
        text-transform: none;
        letter-spacing: 0;
      }
      .history-list {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 6px 0;
        font-size: 12px;
        line-height: 1.4;
      }
      .history-empty {
        padding: 10px 12px;
        color: #555;
        font-style: italic;
      }
      .history-item {
        padding: 4px 12px;
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: default;
      }
      .history-item .marker {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        flex: 0 0 auto;
      }
      .history-item.past .marker {
        background: #4f80ff;
      }
      .history-item.future .marker {
        background: #444;
      }
      .history-item.cursor {
        color: #fff;
        background: rgba(26, 115, 232, 0.12);
      }
      .history-item.cursor .marker {
        background: #1a73e8;
        box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.3);
      }
      .history-item.future .label {
        color: #666;
      }
      .history-divider {
        margin: 4px 12px;
        border: 0;
        border-top: 1px dashed #333;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Diagram sandbox</h1>
      <div class="toolbar" id="toolbar">
        <button data-mode="select" class="active">Select</button>
        <button data-mode="draw-rect">Rectangle</button>
        <button data-mode="draw-ellipse">Ellipse</button>
        <span class="separator"></span>
        <button data-action="undo" id="btn-undo" disabled>Undo</button>
        <button data-action="redo" id="btn-redo" disabled>Redo</button>
        <span class="separator"></span>
        <button data-action="save">Save</button>
        <button data-action="load">Load…</button>
        <button data-action="export-svg">Export SVG</button>
        <button data-action="clear">Clear</button>
        <input type="file" id="file-input" accept="application/json" hidden />
      </div>
      <div class="hint">
        <kbd>V</kbd> select · <kbd>R</kbd> rectangle · <kbd>E</kbd> ellipse · <kbd>⌘Z</kbd> undo ·
        <kbd>⌘⇧Z</kbd> redo. Drag from the palette to drop a shape onto the canvas.
      </div>
    </header>
    <main>
      <aside class="palette">
        <h2>Palette</h2>
        <div class="palette-tabs" id="palette-tabs"></div>
        <div class="palette-items" id="palette-items"></div>
      </aside>
      <div id="stage" class="stage"></div>
      <aside class="history-panel">
        <h2>
          History
          <span class="history-counter" id="history-counter"></span>
        </h2>
        <div class="history-list" id="history-list"></div>
      </aside>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
