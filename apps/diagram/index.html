<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Suppress the browser's own pinch / double-tap page zoom on touch
         devices: the editor owns zooming (pinch gesture → scene zoom). Without
         this, iOS Safari visually zooms the PAGE while pointer coordinates stay
         in layout space, so hit-testing lands "off to the side" of where
         elements appear after a pinch. `viewport-fit=cover` handles notches. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>@oh-just-another/demo</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body,
      #root {
        margin: 0;
        height: 100%;
      }
      /* No rubber-band / pull-to-refresh, and the page itself never
         scrolls or pans on touch — the canvas handles all gestures. */
      html,
      body {
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
      }

      /* Theme tokens (light / dark, incl. legacy --bg / --accent / …) come
         from @oh-just-another/react-ui/styles.css — the canonical iris palette.
         The editor scopes data-theme to its own root and follows the OS theme
         ("system") by default — the page isn't forced to a fixed theme. */

      body {
        background: var(--bg);
        color: var(--text);
      }

      /* Adaptive layout — phone width.
       * On ≤640px the side panels stack at the bottom as a horizontal
       * scroll strip ("bottom-sheet"-style). Header collapses to a
       * compact row; canvas takes the full remaining height.
       * Each panel column uses `data-panel-stack` to opt-in.
       */
      @media (max-width: 640px) {
        [data-panel-stack="main"] {
          flex-direction: column !important;
        }
        [data-panel-stack="main"] > [data-panel="palette"],
        [data-panel-stack="main"] > [data-panel="property"],
        [data-panel-stack="main"] > [data-panel="layers"],
        [data-panel-stack="main"] > [data-panel="history"] {
          width: 100% !important;
          max-height: 35vh;
          border-left: none !important;
          border-right: none !important;
          border-top: 1px solid var(--border);
          flex: 0 0 auto !important;
        }
        [data-panel-stack="main"] > [data-panel="canvas"] {
          flex: 1 1 auto !important;
          min-height: 40vh;
        }
        [data-panel="palette"] {
          display: flex;
          flex-direction: row;
          overflow-x: auto;
        }
        [data-mobile-only="hide"] {
          display: none !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
